<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポリシー | 学チャレ合同会社</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .page-wrapper {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            margin-bottom: 3rem;
        }

        .logo img {
            height: 50px;
            width: auto;
        }

        .coming-soon-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #e67e22;
            margin-bottom: 1rem;
        }

        .coming-soon-title {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.05;
            color: #1d1d1f;
            margin-bottom: 1.5rem;
        }

        .coming-soon-sub {
            font-size: 1rem;
            color: #6e6e73;
            max-width: 420px;
            margin: 0 auto 3rem;
            line-height: 1.6;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9375rem;
            color: #e67e22;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.15s ease;
        }

        .back-link:hover {
            color: #d35400;
        }

        .back-link::before {
            content: '←';
        }
    </style>
</head>

<body>
    <div class="page-wrapper">
        <div class="logo">
            <img src="media/ロゴ.png" alt="学チャレ合同会社ロゴ">
        </div>

        <p class="coming-soon-label">Policy</p>
        <h1 class="coming-soon-title">Coming Soon</h1>
        <p class="coming-soon-sub">ポリシーページは現在準備中です。<br>もうしばらくお待ちください。</p>

        <a href="index.html" class="back-link">トップページに戻る</a>
    </div>
</body>

</html>
